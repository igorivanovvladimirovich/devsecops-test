# Trivy Operator Helm Values (оптимизированные)
operator:
  replicas: 1
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

trivy:
  ignoreUnfixed: false
  severity: "CRITICAL,HIGH,MEDIUM,LOW"
  timeout: "5m0s"
  
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1
      memory: 1Gi

trivyOperator:
  scanJobTimeout: "5m"
  scanJobsConcurrentLimit: 2
  vulnerabilityReportsPlugin: "Trivy"
  
  # Compression включен (gzip)
  compressLogs: true

serviceAccount:
  create: true
  annotations:
    iam.gke.io/gcp-service-account: "trivy-operator@${PROJECT_ID}.iam.gserviceaccount.com"

# Workload Identity
workloadIdentity:
  enabled: true