apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-pubsub-config
  namespace: trivy-system
data:
  PROJECT_ID: "YOUR_PROJECT_ID"
  TOPIC_NAME: "trivy-reports"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-log-publisher
  namespace: trivy-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trivy-log-publisher
  template:
    metadata:
      labels:
        app: trivy-log-publisher
    spec:
      serviceAccountName: trivy-operator
      containers:
      - name: publisher
        image: gcr.io/google.com/cloudsdktool/google-cloud-cli:slim
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          while true; do
            # Get vulnerability reports
            kubectl get vulnerabilityreports -A -o json > /tmp/reports.json
            
            # Compress with gzip (Trivy format)
            gzip -c /tmp/reports.json > /tmp/reports.json.gz
            
            # Publish to Pub/Sub
            gcloud pubsub topics publish ${TOPIC_NAME} \
              --project=${PROJECT_ID} \
              --message="$(base64 /tmp/reports.json.gz)"
            
            echo "Published report at $(date)"
            sleep 300  # Every 5 minutes
          done
        envFrom:
        - configMapRef:
            name: trivy-pubsub-config
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi