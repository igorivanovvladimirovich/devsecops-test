apiVersion: v1
kind: ConfigMap
metadata:
  name: trivy-pubsub-config
  namespace: trivy-system
data:
  TOPIC_NAME: "trivy-reports"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-log-publisher
  namespace: trivy-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trivy-log-publisher
  template:
    metadata:
      labels:
        app: trivy-log-publisher
    spec:
      serviceAccountName: trivy-operator
      containers:
      - name: publisher
        image: google/cloud-sdk:slim
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          apt-get update && apt-get install -y kubectl
          
          PROJECT_ID=$(gcloud config get-value project)
          
          while true; do
            echo "[$(date)] Collecting vulnerability reports..."
            
            kubectl get vulnerabilityreports -A -o json > /tmp/reports.json
            
            if [ -s /tmp/reports.json ]; then
              gzip -c /tmp/reports.json > /tmp/reports.json.gz
              
              gcloud pubsub topics publish ${TOPIC_NAME} \
                --project=${PROJECT_ID} \
                --message="$(base64 -w0 /tmp/reports.json.gz)"
              
              echo "✅ Published report"
            else
              echo "⚠️  No reports yet"
            fi
            
            sleep 300
          done
        env:
        - name: TOPIC_NAME
          valueFrom:
            configMapKeyRef:
              name: trivy-pubsub-config
              key: TOPIC_NAME
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi