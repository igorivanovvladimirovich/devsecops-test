apiVersion: apps/v1
kind: Deployment
metadata:
  name: falco-exporter
  namespace: security-monitoring
  labels:
    app: falco-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falco-exporter
  template:
    metadata:
      labels:
        app: falco-exporter
    spec:
      serviceAccountName: default
      containers:
      - name: falco-exporter
        image: falcosecurity/falco-exporter:latest
        ports:
        - name: metrics
          containerPort: 19090
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /liveness
            port: 19090
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /readiness
            port: 19090
          initialDelaySeconds: 10
          periodSeconds: 15
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: falco-socket
          mountPath: /var/run/falco
      volumes:
      - name: falco-socket
        hostPath:
          path: /var/run/falco
---
apiVersion: v1
kind: Service
metadata:
  name: falco-exporter
  namespace: security-monitoring
  labels:
    app: falco-exporter
spec:
  selector:
    app: falco-exporter
  ports:
  - name: metrics
    port: 19090
    targetPort: 19090
  - name: events
    port: 8080
    targetPort: 8080
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: falco-exporter
  namespace: security-monitoring