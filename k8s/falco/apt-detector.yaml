# k8s/falco/apt-detector.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apt-detector
  namespace: security-monitoring
  labels:
    app: apt-detector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apt-detector
  template:
    metadata:
      labels:
        app: apt-detector
    spec:
      serviceAccountName: apt-detector
      containers:
      - name: detector
        image: google/cloud-sdk:slim
        env:
        - name: PROJECT_ID
          value: "devsecops-test-1772362415"
        - name: PUBSUB_TOPIC
          value: "apt-detection"
        - name: CHECK_INTERVAL
          value: "30"
        command:
        - /bin/bash
        - -c
        - |
          echo "APT Detector starting..."

          APISERVER=https://kubernetes.default.svc
          SERVICEACCOUNT=/var/run/secrets/kubernetes.io/serviceaccount
          TOKEN=$(cat ${SERVICEACCOUNT}/token)
          CACERT=${SERVICEACCOUNT}/ca.crt

          echo "Testing API connection..."
          curl -s --cacert ${CACERT} \
            --header "Authorization: Bearer ${TOKEN}" \
            ${APISERVER}/api/v1/namespaces | grep -q "kind" \
            && echo "✅ API connection OK" \
            || echo "❌ API connection FAILED"

          publish_alert() {
            local indicator_type=$1
            local details=$2
            local risk_score=$3
            MESSAGE="{\"detection_time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"indicator_type\":\"${indicator_type}\",\"details\":\"${details}\",\"risk_score\":${risk_score},\"source\":\"apt-detector\"}"
            echo "$MESSAGE" > /tmp/alert.json
            gcloud pubsub topics publish ${PUBSUB_TOPIC} \
              --project=${PROJECT_ID} \
              --message="${MESSAGE}" 2>&1 || true
            echo "[$(date)] ALERT published: ${indicator_type}"
          }

          while true; do
            echo "[$(date)] Running APT detection sweep..."

            for NS in apt-simulation vulnerable-apps; do
              PODS=$(curl -s --cacert ${CACERT} \
                --header "Authorization: Bearer ${TOKEN}" \
                ${APISERVER}/api/v1/namespaces/${NS}/pods \
                | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          pods = [item['metadata']['name'] for item in data.get('items', [])]
          print('\n'.join(pods))
          " 2>/dev/null)

              POD_COUNT=$(echo "$PODS" | grep -c . || echo 0)
              echo "  Namespace $NS: $POD_COUNT pods"

              for POD_NAME in $PODS; do
                [ -z "$POD_NAME" ] && continue

                LOGS=$(curl -s --cacert ${CACERT} \
                  --header "Authorization: Bearer ${TOKEN}" \
                  "${APISERVER}/api/v1/namespaces/${NS}/pods/${POD_NAME}/log?tailLines=50" \
                  2>/dev/null || true)

                echo "  Pod $POD_NAME: $(echo "$LOGS" | wc -l) log lines"

                if echo "$LOGS" | grep -qiE "magic_file|\.magic_file|Magic file|touch /tmp"; then
                  echo "  🚨 Magic file detected in $POD_NAME!"
                  publish_alert "magic_file_detected" \
                    "Magic file in pod ${POD_NAME} ns=${NS}" 90
                fi

                if echo "$LOGS" | grep -qiE "31337|xmrig|miner|Attempting|C&C|crypto"; then
                  echo "  🚨 C&C/miner detected in $POD_NAME!"
                  publish_alert "cc_connection_or_miner" \
                    "C&C or miner in pod ${POD_NAME} ns=${NS}" 95
                fi
              done
            done

            sleep ${CHECK_INTERVAL}
          done
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: apt-detector
  namespace: security-monitoring
  annotations:
    iam.gke.io/gcp-service-account: cloud-functions-sa@devsecops-test-1772362415.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: apt-detector
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "namespaces"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: apt-detector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: apt-detector
subjects:
- kind: ServiceAccount
  name: apt-detector
  namespace: security-monitoring
