apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-crypto-miner
  namespace: apt-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-miner
  template:
    metadata:
      labels:
        app: crypto-miner
        threat-level: high
    spec:
      containers:
      - name: miner
        image: busybox:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "=== APT Simulation: Crypto Miner ==="
          touch /tmp/.magic_file
          echo "timestamp: $(date)" > /tmp/.magic_file
          while true; do
            dd if=/dev/zero of=/dev/null bs=1M count=100 2>/dev/null
            sleep 30
          done
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi