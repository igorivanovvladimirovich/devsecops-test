apiVersion: v1
kind: Pod
metadata:
  name: cc-connector
  namespace: apt-simulation
  labels:
    app: cc-connection
    threat-level: critical
spec:
  containers:
  - name: connector
    image: nicolaka/netshoot:latest
    command:
    - /bin/bash
    - -c
    - |
      #!/bin/bash
      echo "=== APT Simulation: C&C Connection ==="
      
      # Create magic file
      touch /tmp/.magic_file
      echo "cc_connection_active: true" > /tmp/.magic_file
      
      # Function to attempt C&C connection
      attempt_cc_connection() {
        local target=$1
        local port=$2
        
        echo "[$(date)] Attempting connection to ${target}:${port}"
        
        # Try with nc
        timeout 2 nc -zv ${target} ${port} 2>&1 || true
        
        # Try with telnet
        timeout 2 telnet ${target} ${port} 2>&1 || true
        
        # Try with bash TCP
        timeout 2 bash -c "cat < /dev/tcp/${target}/${port}" 2>&1 || true
      }
      
      # Main loop
      while true; do
        # Try various C&C servers on port 31337
        attempt_cc_connection "8.8.8.8" 31337
        attempt_cc_connection "1.1.1.1" 31337
        attempt_cc_connection "example.com" 31337
        
        echo "Waiting 60 seconds before next attempt..."
        sleep 60
      done
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi