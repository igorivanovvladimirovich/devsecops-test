apiVersion: v1
kind: Pod
metadata:
  name: old-alpine
  namespace: vulnerable-apps
  labels:
    app: old-alpine
spec:
  containers:
  - name: alpine
    image: alpine:3.10  # Old version with CVEs
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi