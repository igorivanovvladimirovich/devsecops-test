apiVersion: apps/v1
kind: Deployment
metadata:
  name: fake-crypto-miner
  namespace: apt-simulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-miner
  template:
    metadata:
      labels:
        app: crypto-miner
        threat: apt-simulation
    spec:
      containers:
      - name: miner
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          touch /tmp/.magic_file
          echo "Magic file created at $(date)" > /tmp/.magic_file
          while true; do
            for i in $(seq 1 1000000); do echo $i > /dev/null; done
            sleep 1
          done
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 128Mi