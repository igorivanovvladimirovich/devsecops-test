name: Terraform Plan (VULNERABLE)

on:
  pull_request:  # ⚠️ VULNERABLE
    branches: [ main ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # ⚠️ PR code!
      
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}
      
      - uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
      
      - name: Run Custom Validation  # ⚠️ EXECUTES UNTRUSTED CODE
        run: |
          if [ -f "scripts/exploit/validate.sh" ]; then
            bash scripts/exploit/validate.sh
          fi
      
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -no-color