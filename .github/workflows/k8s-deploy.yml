name: Deploy K8s

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/k8s-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devsecops-gke
          location: us-central1

      - name: Deploy namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Install Trivy Operator
        run: |
          helm repo add aqua https://aquasecurity.github.io/helm-charts/
          helm repo update
          helm upgrade --install trivy-operator aqua/trivy-operator \
            --namespace trivy-system \
            --values k8s/trivy-operator/values.yaml \
            --wait

      - name: Deploy Trivy Pub/Sub Publisher
        run: kubectl apply -f k8s/trivy-operator/pubsub-publisher.yaml

      - name: Deploy vulnerable apps
        run: kubectl apply -f k8s/vulnerable-apps/

      - name: Redeploy APT simulation
        run: |
          kubectl delete pods -n apt-simulation --all --ignore-not-found=true
          kubectl apply -f k8s/apt-simulation/
          
      - name: Deploy network policies
        run: kubectl apply -f k8s/network-policies/ || true
      
      - name: Wait for Trivy scans
        run: |
          echo "Waiting for initial scans..."
          sleep 60
          kubectl get vulnerabilityreports -A || echo "No reports yet"