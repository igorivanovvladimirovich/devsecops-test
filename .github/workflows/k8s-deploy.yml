name: Deploy K8s

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/k8s-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devsecops-gke
          location: us-central1

      # ── 1. Namespaces first — everything depends on them ──────────
      - name: Deploy namespaces
        run: |
          kubectl apply -f k8s/namespaces/
          kubectl wait --for=jsonpath='{.status.phase}'=Active \
            namespace/trivy-system \
            namespace/vulnerable-apps \
            namespace/apt-simulation \
            namespace/security-monitoring \
            --timeout=30s

      # ── 2. Security tooling — needs namespaces ────────────────────
      - name: Install Trivy Operator
        run: |
          helm repo add aqua https://aquasecurity.github.io/helm-charts/
          helm repo update
          helm upgrade --install trivy-operator aqua/trivy-operator \
            --namespace trivy-system \
            --values k8s/trivy-operator/values.yaml \
            --timeout 3m \
            --wait=false


      - name: Wait for Trivy Operator ready
        run: |
          echo "Waiting for Trivy Operator to be ready..."
          kubectl wait --for=condition=Ready pods \
            -l app.kubernetes.io/name=trivy-operator \
            -n trivy-system \
            --timeout=120s || true
          kubectl get pods -n trivy-system

      - name: Deploy vulnerable apps
        run: kubectl apply -f k8s/vulnerable-apps/

      - name: Wait for vulnerable apps ready
        run: |
          echo "Waiting for vulnerable apps..."
          kubectl wait --for=condition=Ready pods \
            --all -n vulnerable-apps \
            --timeout=120s || true
          kubectl get pods -n vulnerable-apps

      - name: Deploy APT simulation
        run: kubectl apply -f k8s/apt-simulation/

      - name: Wait for APT simulation ready
        run: |
          echo "Waiting for APT simulation pods..."
          kubectl wait --for=condition=Ready pods \
            --all -n apt-simulation \
            --timeout=120s || true
          kubectl get pods -n apt-simulation

      - name: Deploy APT Detector
        run: kubectl apply -f k8s/falco/apt-detector.yaml

      - name: Wait for APT Detector ready
        run: |
          kubectl wait --for=condition=Ready pods \
            -l app=apt-detector \
            -n security-monitoring \
            --timeout=60s || true

      # ── 5. Supporting infra — needs workloads to exist ───────────
      - name: Deploy Trivy Pub/Sub Publisher
        run: kubectl apply -f k8s/trivy-operator/pubsub-publisher.yaml

      # ── 6. Network policies last — locks down running workloads ──
      - name: Deploy network policies
        run: kubectl apply -f k8s/network-policies/ || true

      - name: Check deployment status
        run: |
          echo "=== Trivy Operator ==="
          kubectl get pods -n trivy-system

          echo "=== Falco / APT Detector ==="
          kubectl get pods -n security-monitoring
          kubectl logs -n security-monitoring \
            -l app=apt-detector --tail=5 2>/dev/null || true

          echo "=== Vulnerable Apps ==="
          kubectl get pods -n vulnerable-apps

          echo "=== APT Simulation ==="
          kubectl get pods -n apt-simulation

          echo "=== VulnerabilityReports ==="
          kubectl get vulnerabilityreports -A --no-headers 2>/dev/null \
            | wc -l | xargs echo "Total reports:"