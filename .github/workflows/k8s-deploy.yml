name: Deploy K8s

on:
  push:
    branches: [main]
    paths:
      - 'k8s/**'
      - '.github/workflows/k8s-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: devsecops-gke
          location: us-central1

      # ── 1. Namespaces first — everything depends on them ──────────
      - name: Deploy namespaces
        run: |
          kubectl apply -f k8s/namespaces/
          kubectl wait --for=jsonpath='{.status.phase}'=Active \
            namespace/trivy-system \
            namespace/vulnerable-apps \
            namespace/apt-simulation \
            namespace/security-monitoring \
            --timeout=30s

      # ── 2. Security tooling — needs namespaces ────────────────────
      - name: Install Trivy Operator
        run: |
          helm repo add aqua https://aquasecurity.github.io/helm-charts/
          helm repo update
          helm upgrade --install trivy-operator aqua/trivy-operator \
            --namespace trivy-system \
            --values k8s/trivy-operator/values.yaml \
            --timeout 3m \
            --wait=false

      - name: Install Falco
        run: |
          helm repo add falcosecurity https://falcosecurity.github.io/charts
          helm repo update
          helm upgrade --install falco falcosecurity/falco \
            --namespace security-monitoring \
            --values k8s/falco/values.yaml \
            --timeout 5m \
            --wait=false

      # ── 3. Falco extras — needs Falco namespace to exist ─────────
      - name: Apply Falco custom rules
        run: kubectl apply -f k8s/falco/falco-rules.yaml

      - name: Deploy Falco exporter
        run: kubectl apply -f k8s/falco/falco-exporter.yaml─────────────────────

      - name: Deploy vulnerable apps
        run: kubectl apply -f k8s/vulnerable-apps/

      - name: Deploy APT simulation
        run: kubectl apply -f k8s/apt-simulation/

      # ── 5. Supporting infra — needs workloads to exist ───────────
      - name: Deploy Trivy Pub/Sub Publisher
        run: kubectl apply -f k8s/trivy-operator/pubsub-publisher.yaml

      # ── 6. Network policies last — locks down running workloads ──
      - name: Deploy network policies
        run: kubectl apply -f k8s/network-policies/ || true

      # ── 7. Status check ───────────────────────────────────────────
      - name: Check deployment status
        run: |
          echo "=== Namespaces ==="
          kubectl get namespaces

          echo "=== Trivy Operator ==="
          kubectl get pods -n trivy-system

          echo "=== Falco ==="
          kubectl get pods -n security-monitoring

          echo "=== Vulnerable Apps ==="
          kubectl get pods -n vulnerable-apps

          echo "=== APT Simulation ==="
          kubectl get deployments -n apt-simulation
          kubectl get pods -n apt-simulation
