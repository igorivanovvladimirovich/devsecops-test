name: Debug OIDC

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check OIDC token availability
        run: |
          echo "Token URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "Token set: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN != '' }}"
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "OIDC NOT injected - permissions blocked upstream"
          else
            echo "OIDC injected successfully"
          fi